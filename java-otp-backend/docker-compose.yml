version: '3.8'
services:
  otp:
    image: opentripplanner/opentripplanner:latest
    container_name: brasov_otp
    environment:
      - JAVA_OPTS=-Xmx4G
    ports:
      - "8080:8080"
    volumes:
      - ./otp-config:/var/otp/graphs/default
    command: [ "--build", "--serve", "/var/otp/graphs/default" ]

  routing-api:
    build: .
    container_name: brasov_routing_api
    ports:
      - "8081:8081"
    environment:
      - OTP_URL=http://otp:8080/otp/routers/default
    depends_on:
      - otp
