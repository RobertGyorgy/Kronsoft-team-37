<main class="form-container">
  <!-- Header -->
  <header class="top-bar">
    <button class="back-pill" (click)="goBack()">
      <span class="material-icons">arrow_back</span>
      <span class="back-text">Categorii</span>
    </button>
  </header>

  <div class="scroll-content">
    <h1 class="form-title">Scrie raportul</h1>

    <div class="report-form">
      <div class="input-group">
        <label>Numele problemei</label>
        <input type="text" placeholder="Nume" [(ngModel)]="formData.title">
      </div>

      <div class="input-group">
        <label>Adresa</label>
        <input type="text" placeholder="scrie adresa, cartierul, zona" [(ngModel)]="formData.address">
      </div>

      <div class="input-group">
        <label>Descriere</label>
        <textarea placeholder="Descrie problema" rows="5" [(ngModel)]="formData.description"></textarea>
      </div>

      <div class="input-group">
        <label>Categorie</label>
        <div class="category-chips">
          @for (cat of categories; track cat) {
            <button 
              type="button"
              class="category-chip" 
              [class.active]="formData.category === cat"
              (click)="formData.category = cat">
              {{ cat }}
            </button>
          }
        </div>
      </div>

      <button class="upload-btn" (click)="toggleActionSheet()">
        <span>Incarca una sau mai multe poze</span>
      </button>

      <!-- Hidden Gallery Input -->
      <input 
        type="file" 
        id="galleryInput" 
        style="display: none;" 
        accept="image/*" 
        multiple
        (change)="onFileSelected($event)">

      <div class="photos-preview">
        @for (photo of uploadedPhotos(); track photo) {
          <div class="photo-card">
            <img [src]="photo" alt="Upload preview">
          </div>
        }
        @if (uploadedPhotos().length < 1) { <div class="photo-placeholder"></div> }
        @if (uploadedPhotos().length < 2) { <div class="photo-placeholder"></div> }
      </div>

      <button class="submit-btn" (click)="onSubmit()">
        Trimite
      </button>
    </div>
  </div>

  <!-- Action Sheet Overlay -->
  @if (showActionSheet()) {
    <div class="overlay-backdrop" (click)="toggleActionSheet()">
      <div class="action-sheet" (click)="$event.stopPropagation()">
        <div class="drag-handle"></div>
        <h3>Selectați sursa fotografiei</h3>
        <div class="action-buttons">
          <button class="action-option" (click)="selectCamera()">
            <span class="material-icons">photo_camera</span>
            <span>Fă fotografii</span>
          </button>
          <button class="action-option" (click)="selectGallery()">
            <span class="material-icons">photo_library</span>
            <span>Încarcă din telefon</span>
          </button>
        </div>
        <button class="cancel-btn" (click)="toggleActionSheet()">Anulează</button>
      </div>
    </div>
  }

  <!-- Live Camera Overlay -->
  @if (isCameraActive()) {
    <div class="camera-overlay">
      <div class="camera-header">
        <button class="close-camera" (click)="stopCamera()">
          <span class="material-icons">close</span>
        </button>
        <span>Cameră Live</span>
      </div>
      
      <div class="video-wrapper">
        <video #videoElement autoplay playsinline></video>
        <canvas #canvasElement style="display: none;"></canvas>
      </div>

      <div class="camera-footer">
        <button class="capture-btn" (click)="capturePhoto()">
          <div class="inner-circle"></div>
        </button>
      </div>
    </div>
  }
</main>
